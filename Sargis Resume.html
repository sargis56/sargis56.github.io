<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sargis Nahapetyan · Resume</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ═══════════════════════════════════════════════════════════
   Theme tokens — lifted from the portfolio so the two match.
   Default is the light "print" palette (paper-safe).
   ═══════════════════════════════════════════════════════════ */
:root,
[data-theme="print"] {
  --bg:       oklch(97% 0.008 80);
  --bg-2:     oklch(93% 0.01 80);
  --fg:       oklch(20% 0.01 60);
  --fg-dim:   oklch(45% 0.01 60);
  --fg-faint: oklch(58% 0.01 60);
  --line:     oklch(83% 0.01 80);
  --accent:   oklch(52% 0.16 var(--hue, 30));
  --font-display: 'Space Grotesk', sans-serif;
  --font-body:    'Space Grotesk', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
  --chip-bg:  var(--bg-2);
}
[data-theme="engine"] {
  --bg:       oklch(16% 0.012 250);
  --bg-2:     oklch(24% 0.016 250);
  --fg:       oklch(94% 0.008 80);
  --fg-dim:   oklch(70% 0.01 250);
  --fg-faint: oklch(50% 0.01 250);
  --line:     oklch(32% 0.012 250);
  --accent:   oklch(72% 0.17 var(--hue, 55));
  --chip-bg:  var(--bg-2);
}
[data-theme="serif"] {
  --font-display: 'Instrument Serif', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #8a8a86; }
body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }

/* ─── Page sheet ───────────────────────────────────────── */
.sheet {
  width: 8.5in; min-height: 11in;
  margin: 28px auto;
  padding: 0.56in 0.62in 0.5in;
  background: var(--bg); color: var(--fg);
  box-shadow: 0 18px 60px -20px rgba(0,0,0,.45);
  position: relative;
  font-size: 9.2pt; line-height: 1.42;
  display: flex; flex-direction: column;
}
.sheet::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
  background: var(--accent);
}

/* ─── Header ───────────────────────────────────────────── */
.head { display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: start; }
.name {
  font: 600 34pt/0.98 var(--font-display);
  letter-spacing: -0.015em;
}
[data-theme="serif"] .name { font-weight: 400; font-size: 38pt; letter-spacing: 0; }
.roles {
  margin-top: 6px;
  font: 500 10pt var(--font-mono);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.roles .amp { color: var(--accent); margin: 0 .35em; }

.contact {
  text-align: right;
  font: 500 8pt/1.7 var(--font-mono);
  color: var(--fg-dim);
}
.contact a:hover { color: var(--accent); }
.contact .loc { color: var(--fg-faint); }

/* ─── Bio + stats strip ────────────────────────────────── */
.bio {
  margin-top: 16px; color: var(--fg-dim);
  font-size: 9.2pt; max-width: 68ch;
  text-wrap: pretty;
}
.stats {
  margin-top: 14px;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  padding: 11px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.stat { display: flex; align-items: center; gap: 9px; }
.stat-val {
  font: 600 15pt/1 var(--font-display); color: var(--accent);
  letter-spacing: -0.01em; white-space: nowrap;
}
.stat-lbl { font: 500 7pt/1.3 var(--font-mono); color: var(--fg-dim); text-wrap: balance; }

/* ─── Body grid ────────────────────────────────────────── */
.body {
  margin-top: 16px;
  display: grid; grid-template-columns: 1fr 0.58fr;
  gap: 30px;
  flex: 1;
}
.col { display: flex; flex-direction: column; gap: 16px; }

/* ─── Section heading ──────────────────────────────────── */
.sec-h {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 7px;
}
.sec-k {
  font: 600 7.5pt var(--font-mono); color: var(--accent);
  letter-spacing: 0.14em; text-transform: uppercase;
  white-space: nowrap;
}
.sec-t {
  font: 600 12.5pt var(--font-display); letter-spacing: -0.005em;
}
[data-theme="serif"] .sec-t { font-weight: 400; font-style: italic; font-size: 15pt; }
.sec-r { flex: 1; height: 1px; background: var(--line); align-self: center; }

/* ─── Experience ───────────────────────────────────────── */
.xp { display: flex; flex-direction: column; gap: 8px; }
.xp-row { break-inside: avoid; }
.xp-top {
  display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
}
.xp-role { font: 600 9.6pt var(--font-display); }
.xp-org  { color: var(--fg-dim); font-weight: 500; }
.xp-org::before { content: " · "; color: var(--fg-faint); }
.xp-when {
  font: 500 7.4pt var(--font-mono); color: var(--fg-faint);
  letter-spacing: 0.03em; white-space: nowrap;
}
.xp-sum { margin-top: 2px; color: var(--fg-dim); font-size: 8.6pt; text-wrap: pretty; }
.xp-row.min .xp-sum { display: none; }
.xp-row.min .xp-top { font-size: 8.8pt; }

/* ─── Projects ─────────────────────────────────────────── */
.proj { display: flex; flex-direction: column; gap: 6px; }
.proj-row {
  display: grid; grid-template-columns: 4px 1fr; gap: 10px;
  break-inside: avoid;
}
.proj-bar { background: var(--accent); border-radius: 2px; opacity: .85; }
.proj-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.proj-name { font: 600 9.4pt var(--font-display); }
.proj-tech {
  font: 500 7.2pt var(--font-mono); color: var(--fg-faint);
  letter-spacing: 0.03em;
}
.proj-tag { color: var(--fg-dim); font-size: 8.4pt; }

/* ─── Skills ───────────────────────────────────────────── */
.skills { display: flex; flex-direction: column; gap: 8px; }
.sk-row { break-inside: avoid; }
.sk-cat {
  font: 600 7.2pt var(--font-mono); color: var(--fg-faint);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 4px;
}
.sk-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  display: inline-flex; align-items: center;
  padding: 2.5px 7px; border-radius: 999px;
  font: 500 7pt var(--font-mono);
  background: var(--chip-bg); color: var(--fg-dim);
  border: 1px solid var(--line);
  letter-spacing: 0.01em;
}

/* ─── Education ────────────────────────────────────────── */
.edu { display: flex; flex-direction: column; gap: 7px; }
.edu-row { break-inside: avoid; }
.edu-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.edu-school { font: 600 9pt var(--font-display); }
.edu-cred { color: var(--fg-dim); font-size: 8pt; }
.edu-note {
  margin-top: 1px; font: 500 7.2pt var(--font-mono);
  color: var(--accent); letter-spacing: 0.02em;
}
.certs {
  margin-top: 10px; padding-top: 9px;
  border-top: 1px solid var(--line);
}
.certs-h {
  font: 600 7.2pt var(--font-mono); color: var(--fg-faint);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 6px;
}
.certs ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.certs li {
  position: relative; padding-left: 11px;
  display: flex; flex-direction: column; gap: 1px;
  break-inside: avoid;
}
.certs li::before {
  content: ""; position: absolute; left: 0; top: 4px;
  width: 4px; height: 4px; background: var(--accent); border-radius: 1px;
}
.certs .name { font-size: 8.2pt; color: var(--fg); line-height: 1.25; text-wrap: balance; }
.certs .src  { font: 500 7pt var(--font-mono); color: var(--fg-faint); letter-spacing: 0.03em; }

/* ─── More-at footer ───────────────────────────────────── */
.proj-more {
  margin-top: 2px;
  font: 500 8.2pt var(--font-mono); color: var(--fg-dim);
  letter-spacing: 0.02em;
  display: flex; align-items: center; gap: 8px;
}
.proj-more .url { color: var(--accent); font-weight: 700; }
.proj-more .arrow { color: var(--accent); font-weight: 700; }

/* ─── Density: full ────────────────────────────────────── */
[data-density="full"] .sheet { min-height: 11in; padding: 0.5in 0.58in 0.4in; }
[data-density="full"] .xp-row.min .xp-sum { display: block; }
[data-density="full"] .xp-row.min .xp-top { font-size: inherit; }
[data-density="full"] .xp { gap: 10px; }
[data-density="full"] .col { gap: 17px; }
[data-density="full"] .xp { gap: 6px; }
[data-density="full"] .xp-sum { line-height: 1.33; }
[data-density="full"] .bio { margin-top: 10px; }
[data-density="full"] .stats { margin-top: 9px; padding: 7px 0; }
[data-density="full"] .body { margin-top: 11px; }

/* ═══ PRINT ═════════════════════════════════════════════
   Full-bleed PDF (margin 0). Content sits ≥0.4in from every
   edge via .sheet padding so a later 100% paper re-print
   stays inside the printer's non-printable border. */
@page { size: letter; margin: 0; }
@media print {
  html, body { background: var(--bg); }
  .sheet { margin: 0; box-shadow: none; width: 8.5in; }
  .tweaks, .hint { display: none !important; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* ═══ Tweaks panel ══════════════════════════════════════ */
.hint {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  font: 500 11px var(--font-mono); color: #eee;
  background: #222; padding: 7px 12px; border-radius: 6px;
  letter-spacing: 0.03em; z-index: 90;
}
.tweaks {
  position: fixed; bottom: 16px; right: 16px; z-index: 99;
  width: 240px; padding: 14px;
  background: #1b1b1f; color: #e8e8ea;
  border: 1px solid #333; border-radius: 10px;
  font: 500 12px 'JetBrains Mono', monospace;
  box-shadow: 0 12px 40px -10px rgba(0,0,0,.5);
}
.tweaks h4 { font: 600 12px 'JetBrains Mono'; letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; color:#aaa; }
.tw-row { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.tw-row > span { font-size:10px; color:#888; letter-spacing:.06em; text-transform:uppercase; }
.tw-seg { display:flex; gap:4px; }
.tw-seg button {
  flex:1; padding:6px 4px; font:500 10px 'JetBrains Mono';
  background:#2a2a30; color:#ccc; border:1px solid #3a3a42; border-radius:5px; cursor:pointer;
}
.tw-seg button.on { background:#e8e8ea; color:#1b1b1f; border-color:#e8e8ea; }
.tweaks input[type=range]{ width:100%; accent-color:#e8e8ea; }
.tweaks input[type=text]{
  width:100%; padding:6px; font:500 10px 'JetBrains Mono';
  background:#2a2a30; color:#e8e8ea; border:1px solid #3a3a42; border-radius:5px;
}
.tweaks label { display:flex; align-items:center; gap:6px; font-size:11px; cursor:pointer; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* Tweak defaults — host rewrites this block on disk */
const RESUME_TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "print",
  "hue": 30,
  "density": "full",
  "showStats": true,
  "portfolioUrl": "sargis.ca"
}/*EDITMODE-END*/;

/* ───────── curation: what makes the 1-page cut ───────── */

// Experience: which entries get a full summary vs a one-liner
const XP_FULL = ["Niche Protocol", "Asclepius Snakebite Foundation", "Humber College", "Steam Workshop"];
// Re-order for resume (most relevant first, not strictly chrono)
const XP_ORDER = [
  "Prolyncs", "Niche Protocol", "Asclepius Snakebite Foundation",
  "Humber College", "Pirates, Vikings and Knights II", "Steam Workshop",
];

// Projects: top picks for the resume + which tech to show
const PROJ_PICKS = [
  { id: "equinox",          tech: ["Unreal", "C++"] },
  { id: "woe",              tech: ["Unity", "C#", "Networking"] },
  { id: "indie-recommender",tech: ["GPT-4", "RAG", "Next.js"] },
  { id: "fake-news",        tech: ["PyTorch", "Transformers"] },
  { id: "gfx-engine",       tech: ["C++", "OpenGL", "GLSL"] },
];

// Skills: drop Workflow row to save vertical space in compact mode
const SKILL_ROWS_COMPACT = ["Languages", "Engines & 3D", "AI / ML", "Web"];

// Honors notes + curated self-study (resume-only; portfolio doesn't need these)
const EDU_NOTES = {
  "Humber College": "4.0 GPA · top of program",
};
const CERTS = [
  { name: "CS50: Intro to Artificial Intelligence", src: "Harvard" },
  { name: "Practical Deep Learning for Coders", src: "fast.ai" },
  { name: "Claude Code: Agentic Coding Assistant", src: "DeepLearning.AI" },
  { name: "Blender Character Creator", src: "Udemy" },
];

/* ──────────────────────────────────────────────────────── */

function SectionHead({ n, t }) {
  return (
    <div className="sec-h">
      <span className="sec-k">{n} /</span>
      <span className="sec-t">{t}</span>
      <span className="sec-r" />
    </div>
  );
}

function Resume({ tweaks }) {
  const xp = useMemo(() => {
    const byOrg = Object.fromEntries(EXPERIENCE.map(e => [e.org, e]));
    return XP_ORDER.map(o => byOrg[o]).filter(Boolean);
  }, []);
  const projects = useMemo(() => {
    const byId = Object.fromEntries(PROJECTS.map(p => [p.id, p]));
    return PROJ_PICKS.map(pick => ({ ...byId[pick.id], techShort: pick.tech }));
  }, []);
  const skillCats = tweaks.density === "compact" ? SKILL_ROWS_COMPACT : Object.keys(SKILLS);

  return (
    <div className="sheet">
      {/* ── Header ── */}
      <header className="head">
        <div>
          <h1 className="name">{PROFILE.name}</h1>
          <div className="roles">
            {PROFILE.roles[0]}<span className="amp">&</span>{PROFILE.roles[1]}
          </div>
        </div>
        <div className="contact">
          <div><a href={"mailto:" + PROFILE.email}>{PROFILE.email}</a></div>
          <div>{PROFILE.phone}</div>
          {tweaks.portfolioUrl && <div><a href={"https://" + tweaks.portfolioUrl}>{tweaks.portfolioUrl}</a></div>}
          <div className="loc">{PROFILE.location}</div>
        </div>
      </header>

      <p className="bio">{PROFILE.bio}</p>

      {tweaks.showStats && (
        <div className="stats">
          {STATS.map((s, i) => (
            <div className="stat" key={i}>
              <span className="stat-val">{s.value}</span>
              <span className="stat-lbl">{s.label}</span>
            </div>
          ))}
        </div>
      )}

      {/* ── Body ── */}
      <div className="body">
        <div className="col">
          <section>
            <SectionHead n="01" t="Experience" />
            <div className="xp">
              {xp.map((e, i) => {
                const full = XP_FULL.includes(e.org);
                return (
                  <div key={i} className={"xp-row" + (full ? "" : " min")}>
                    <div className="xp-top">
                      <span>
                        <span className="xp-role">{e.role}</span>
                        <span className="xp-org">{e.org}</span>
                      </span>
                      <span className="xp-when">{e.when}</span>
                    </div>
                    <div className="xp-sum">{e.summary}</div>
                  </div>
                );
              })}
            </div>
          </section>

          <section>
            <SectionHead n="02" t="Selected Projects" />
            <div className="proj">
              {projects.map((p, i) => (
                <div className="proj-row" key={i}>
                  <div className="proj-bar" />
                  <div>
                    <div className="proj-top">
                      <span className="proj-name">{p.title}</span>
                      <span className="proj-tech">{p.techShort.join(" · ")}</span>
                    </div>
                    <div className="proj-tag">{p.tagline}</div>
                  </div>
                </div>
              ))}
              <div className="proj-more">
                <span className="arrow">→</span>
                <span>Write-ups, screenshots & demos for every project at <a className="url" href={"https://" + tweaks.portfolioUrl}>{tweaks.portfolioUrl}</a></span>
              </div>
            </div>
          </section>
        </div>

        <aside className="col">
          <section>
            <SectionHead n="03" t="Skills" />
            <div className="skills">
              {skillCats.map(cat => (
                <div className="sk-row" key={cat}>
                  <div className="sk-cat">{cat}</div>
                  <div className="sk-chips">
                    {SKILLS[cat].map(s => <span className="chip" key={s}>{s}</span>)}
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section>
            <SectionHead n="04" t="Education" />
            <div className="edu">
              {EDUCATION.map((e, i) => (
                <div className="edu-row" key={i}>
                  <div className="edu-top">
                    <span className="edu-school">{e.school}</span>
                    <span className="xp-when">{e.when}</span>
                  </div>
                  <div className="edu-cred">{e.cred}</div>
                  {EDU_NOTES[e.school] && <div className="edu-note">{EDU_NOTES[e.school]}</div>}
                </div>
              ))}
            </div>
            <div className="certs">
              <div className="certs-h">Self-study</div>
              <ul>
                {CERTS.map((c, i) => (
                  <li key={i}><span className="name">{c.name}</span><span className="src">{c.src}</span></li>
                ))}
              </ul>
            </div>
          </section>
        </aside>
      </div>
    </div>
  );
}

/* ───────── Tweaks panel ───────── */
function Tweaks({ t, set, open }) {
  if (!open) return null;
  const Seg = ({ k, opts }) => (
    <div className="tw-seg">
      {opts.map(o => (
        <button key={o} className={t[k] === o ? "on" : ""} onClick={() => set({ [k]: o })}>{o}</button>
      ))}
    </div>
  );
  return (
    <div className="tweaks">
      <h4>Tweaks</h4>
      <div className="tw-row"><span>Theme</span><Seg k="theme" opts={["print", "engine", "serif"]} /></div>
      <div className="tw-row"><span>Accent hue · {t.hue}</span>
        <input type="range" min="0" max="360" value={t.hue} onChange={e => set({ hue: +e.target.value })} />
      </div>
      <div className="tw-row"><span>Density</span><Seg k="density" opts={["compact", "full"]} /></div>
      <div className="tw-row">
        <label><input type="checkbox" checked={t.showStats} onChange={e => set({ showStats: e.target.checked })} /> Show highlights strip</label>
      </div>
      <div className="tw-row"><span>Portfolio URL</span>
        <input type="text" value={t.portfolioUrl} onChange={e => set({ portfolioUrl: e.target.value })} placeholder="sargis.ca" />
      </div>
    </div>
  );
}

function App() {
  const [t, setT] = useState(RESUME_TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const set = (patch) => {
    setT(cur => {
      const next = { ...cur, ...patch };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
      return next;
    });
  };

  useEffect(() => {
    document.documentElement.dataset.theme = t.theme;
    document.documentElement.dataset.density = t.density;
    document.documentElement.style.setProperty("--hue", t.hue);
  }, [t.theme, t.density, t.hue]);

  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", h);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", h);
  }, []);

  return (
    <>
      <div className="hint">⌘P / Ctrl+P → Save as PDF · Letter · margins: None · background graphics: on</div>
      <Resume tweaks={t} />
      <Tweaks t={t} set={set} open={tweaksOpen} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
